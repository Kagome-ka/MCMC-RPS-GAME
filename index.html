<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">

    <!-- WAJIB untuk HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>G-B-K Markov</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: clamp(20px, 5vw, 32px);
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);

            max-width: 400px;
            margin: auto;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            flex: 1 1 30%;
            padding: 15px;
            margin: 8px;
            font-size: clamp(14px, 4vw, 18px);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .gunting {
            background: #ff6b6b;
        }

        .batu {
            background: #feca57;
        }

        .kertas {
            background: #1dd1a1;
        }

        #hasil {
            margin-top: 20px;
            font-size: clamp(16px, 4vw, 20px);
        }

        #skor,
        #persen {
            margin-top: 10px;
            font-size: clamp(14px, 3.5vw, 16px);
        }

        /* Khusus layar kecil */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            button {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>✊✋✌️ G-B-K Markov</h1>

        <div class="btn-group">
            <button class="gunting" onclick="main('gunting')">✌️ Gunting</button>
            <button class="batu" onclick="main('batu')">✊ Batu</button>
            <button class="kertas" onclick="main('kertas')">✋ Kertas</button>
        </div>

        <h2 id="hasil"></h2>
        <p id="skor"></p>
        <p id="persen"></p>
        <button onclick="resetGame()" style="margin-top:15px; background:#576574; color:white;">
            🔄 Reset Game
        </button>
        <button onclick="menyerah()" style="margin-top:10px; background:#ee5253; color:white;">
            🏳️ Menyerah
        </button>
    </div>

    <div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">

        <div style="background:white; color:black; padding:20px; border-radius:10px; width:80%; max-width:300px;">
            <h3>📊 Ringkasan</h3>
            <p id="popupText"></p>
            <button onclick="tutupPopup()">OK</button>
        </div>

    </div>

    <script src="source.jsx"></script>

</body>

</html>
